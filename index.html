<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopee Affiliate Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter: `display=swap` text không block render, OK fallback system font
         tạm trong khi load. Material Symbols self-host qua npm package
         `material-symbols` (import trong main.tsx) → font có sẵn trong bundle,
         không phụ thuộc network. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <!-- Material Symbols giờ self-host (bundle local), không cần `.fonts-loaded`
         guard nữa. Nhưng giữ class để CSS `html:not(.fonts-loaded)` safety net
         ẩn icon text thô vẫn hoạt động cho deferred load (lần đầu render). -->
    <script>
      // Wait font Material Symbols Rounded load explicit (chứ không dựa
      // generic `document.fonts.ready` — có thể resolve khi font fail timeout).
      function markFontsLoaded() {
        document.documentElement.classList.add("fonts-loaded");
      }
      if (document.fonts && document.fonts.load) {
        Promise.all([
          document.fonts.load('24px "Material Symbols Rounded"'),
          document.fonts.load('14px "Inter"').catch(() => null),
        ])
          .then(markFontsLoaded)
          .catch(markFontsLoaded); // Fallback: vẫn hiện icon nếu check fail
      } else {
        markFontsLoaded();
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
