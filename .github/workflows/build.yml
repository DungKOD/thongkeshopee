name: Build Tauri App

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            name: macos-x86_64
          - platform: windows-latest
            args: ""
            rust_target: ""
            name: windows-x64

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      - name: Create .env.local from secrets
        shell: bash
        run: |
          cat > .env.local <<EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APPS_SCRIPT_URL=${{ secrets.VITE_APPS_SCRIPT_URL }}
          VITE_ADMIN_ZALO=${{ secrets.VITE_ADMIN_ZALO }}
          VITE_ADMIN_NOTE=${{ secrets.VITE_ADMIN_NOTE }}
          EOF

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "Shopee Affiliate Tracker ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Debug — list bundle output
        if: always()
        shell: bash
        run: |
          echo "=== tauri-action artifactPaths ==="
          echo '${{ steps.tauri.outputs.artifactPaths }}'
          echo "=== bundle dirs ==="
          find target -type d -name bundle -print 2>/dev/null || echo "(no bundle dir found)"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            target/release/bundle/**
            target/*/release/bundle/**
          if-no-files-found: warn
          retention-days: 14
