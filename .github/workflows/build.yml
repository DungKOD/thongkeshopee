name: Build Tauri App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            name: macos-arm64
          # macOS Intel
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            name: macos-x86_64
          # Windows x64
          - platform: windows-latest
            args: ""
            rust_target: ""
            name: windows-x64

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.name }}

      - name: Install npm dependencies
        run: npm ci

      # Inject env từ Secrets → .env.local để Vite pick up lúc build.
      - name: Create .env.local from secrets
        shell: bash
        run: |
          cat > .env.local <<EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APPS_SCRIPT_URL=${{ secrets.VITE_APPS_SCRIPT_URL }}
          VITE_ADMIN_ZALO=${{ secrets.VITE_ADMIN_ZALO }}
          VITE_ADMIN_NOTE=${{ secrets.VITE_ADMIN_NOTE }}
          EOF

      # tauri-action handles: frontend build → rust build → bundle →
      # auto-detect artifact paths → upload to GitHub Release (nếu tagName).
      # `tagName` chỉ set khi push tag v* → trigger release flow.
      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "Shopee Affiliate Tracker ${{ github.ref_name }}"
          releaseBody: |
            ### Download

            - **Windows**: tải file `.msi` hoặc `.exe` bên dưới
            - **macOS Apple Silicon (M1/M2/M3)**: tải `.dmg` có `aarch64`
            - **macOS Intel**: tải `.dmg` có `x64`

            ### Notes
            Ứng dụng chưa ký (code signing) — Windows SmartScreen có thể cảnh báo,
            chọn "More info" → "Run anyway". macOS: nếu Gatekeeper block, right-click
            app trong Applications → "Open" → Open.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action trả artifactPaths dạng JSON array → convert sang newline list
      # cho actions/upload-artifact (chỉ chấp nhận multiline string / glob).
      - name: Format artifact paths
        id: paths
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && steps.tauri.outputs.artifactPaths != '' }}
        shell: bash
        run: |
          {
            echo 'list<<EOF'
            echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (no tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && steps.tauri.outputs.artifactPaths != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ steps.paths.outputs.list }}
          if-no-files-found: error
