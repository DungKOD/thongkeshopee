name: Build Tauri App

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Preflight: cargo test + typecheck. Chạy nhanh trên ubuntu, block matrix
  # build nếu có regression. Gate trước khi tốn minutes build 3 platform.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: preflight
      # Tauri Linux system deps — cargo check/test compile cần webkit2gtk +
      # glib + gobject + gtk. Matrix build (macOS/Windows) tự có OS deps nên
      # không cần step này. Xem https://tauri.app/start/prerequisites/
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential
      - name: Install npm deps
        run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Rust build check
        working-directory: src-tauri
        run: cargo check --quiet --locked
      - name: Rust lib tests (sync_v9 + db)
        working-directory: src-tauri
        run: cargo test --lib --quiet --locked
      - name: Vite build (catch bundle errors)
        run: npm run build
        env:
          # Dummy secret cho vite build check — không deploy, chỉ bundle.
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_STORAGE_BUCKET: dummy
          VITE_FIREBASE_MESSAGING_SENDER_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          VITE_FIREBASE_DATABASE_URL: dummy
          VITE_APPS_SCRIPT_URL: dummy
          VITE_SYNC_API_URL: dummy
          VITE_ADMIN_ZALO: dummy
          VITE_ADMIN_NOTE: dummy

  build:
    # KHÔNG depend preflight — matrix mac/windows chạy song song để user có
    # artifact nhanh. Preflight chạy độc lập làm checker regression, fail
    # hiện trong PR checks nhưng không block release artifacts.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            name: macos-x86_64
          - platform: windows-latest
            args: ""
            rust_target: ""
            name: windows-x64
          - platform: ubuntu-latest
            args: ""
            rust_target: ""
            name: linux-x86_64

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.name }}

      # Tauri Linux deps — chỉ chạy trên ubuntu. webkit2gtk-4.1 + gtk-3 là
      # requirement bắt buộc cho bundle .deb/.AppImage. Nếu skip → cargo build
      # fail với "The system library 'javascriptcoregtk-4.1' ... was not found".
      - name: Install Tauri Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Install npm dependencies
        run: npm ci

      - name: Create .env.local from secrets
        shell: bash
        env:
          SECRET_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          SECRET_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          SECRET_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          SECRET_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          SECRET_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          SECRET_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          SECRET_DB_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          SECRET_APPS_SCRIPT: ${{ secrets.VITE_APPS_SCRIPT_URL }}
          SECRET_SYNC_URL: ${{ secrets.VITE_SYNC_API_URL }}
          SECRET_ZALO: ${{ secrets.VITE_ADMIN_ZALO }}
          SECRET_NOTE: ${{ secrets.VITE_ADMIN_NOTE }}
        run: |
          # Sanity check: in độ dài từng secret (không leak value)
          check() {
            local name="$1"; local val="$2"
            if [ -z "$val" ]; then
              echo "  ❌ $name: EMPTY"
            else
              echo "  ✓  $name: ${#val} chars"
            fi
          }
          echo "=== Secret presence check ==="
          check VITE_FIREBASE_API_KEY "$SECRET_API_KEY"
          check VITE_FIREBASE_AUTH_DOMAIN "$SECRET_AUTH_DOMAIN"
          check VITE_FIREBASE_PROJECT_ID "$SECRET_PROJECT_ID"
          check VITE_FIREBASE_STORAGE_BUCKET "$SECRET_STORAGE_BUCKET"
          check VITE_FIREBASE_MESSAGING_SENDER_ID "$SECRET_SENDER_ID"
          check VITE_FIREBASE_APP_ID "$SECRET_APP_ID"
          check VITE_FIREBASE_DATABASE_URL "$SECRET_DB_URL"
          check VITE_APPS_SCRIPT_URL "$SECRET_APPS_SCRIPT"
          check VITE_SYNC_API_URL "$SECRET_SYNC_URL"
          check VITE_ADMIN_ZALO "$SECRET_ZALO"
          check VITE_ADMIN_NOTE "$SECRET_NOTE"

          cat > .env.local <<EOF
          VITE_FIREBASE_API_KEY=$SECRET_API_KEY
          VITE_FIREBASE_AUTH_DOMAIN=$SECRET_AUTH_DOMAIN
          VITE_FIREBASE_PROJECT_ID=$SECRET_PROJECT_ID
          VITE_FIREBASE_STORAGE_BUCKET=$SECRET_STORAGE_BUCKET
          VITE_FIREBASE_MESSAGING_SENDER_ID=$SECRET_SENDER_ID
          VITE_FIREBASE_APP_ID=$SECRET_APP_ID
          VITE_FIREBASE_DATABASE_URL=$SECRET_DB_URL
          VITE_APPS_SCRIPT_URL=$SECRET_APPS_SCRIPT
          VITE_SYNC_API_URL=$SECRET_SYNC_URL
          VITE_ADMIN_ZALO=$SECRET_ZALO
          VITE_ADMIN_NOTE=$SECRET_NOTE
          EOF

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing: tauri-action auto sinh `.sig` + `latest.json` khi
          # có tag `v*`. Missing key → build vẫn OK nhưng không có artifact
          # update → user dùng bản cũ không auto-update được.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "Shopee Affiliate Tracker ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # tauri-action tự publish `latest.json` + bundle + `.sig` lên Release
          # khi có tagName. updaterJsonPreferNsis: chọn NSIS `.exe` updater thay
          # vì MSI (NSIS support silent update không cần UAC lại).
          updaterJsonPreferNsis: true

      - name: Debug — list bundle output
        if: always()
        shell: bash
        run: |
          echo "=== tauri-action artifactPaths ==="
          echo '${{ steps.tauri.outputs.artifactPaths }}'
          echo "=== bundle dirs ==="
          find target -type d -name bundle -print 2>/dev/null || echo "(no bundle dir found)"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            target/release/bundle/**
            target/*/release/bundle/**
          if-no-files-found: warn
          retention-days: 14
